<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product Form</title>
<link rel="stylesheet" data-th-href="@{/css/style.css}">
</head>
<body>

	<div class="container form-container">
		<h2>[[${product.id == null or product.id eq 0 ? 'Create New Product' : 'Edit Product'}]]</h2>
		
		<form data-th-action="@{/products}" data-th-object="${product}" method="post">
			<input type="hidden" data-th-field="*{id}" >
			
			<div class="form-group">
				<label for="name">Product Name</label>
				<input type="text" id="name" data-th-field="*{name}" required placeholder="Enter product name">
			</div>
			
			<div class="form-group">
				<label for="category">Category</label>
				<select id="category" data-th-field="*{category}" required>
					<option value="">-- Select Category --</option>
					<option data-th-each="category : ${categories}" data-th-value="${category}">[[${category}]]</option>
				</select>
			</div>
			
			<div class="form-group">
				<label for="price">Price ($)</label>
				<input type="number" id="price" data-th-field="*{price}" step="0.01" required>
			</div>
			
			<div class="form-actions">
				<button type="submit" class="btn-success">Save</button>
				<a data-th-href="@{/products}" class="btn-secondary">Cancel</a>
			</div>
		</form>
	</div>

</body>
</html>
