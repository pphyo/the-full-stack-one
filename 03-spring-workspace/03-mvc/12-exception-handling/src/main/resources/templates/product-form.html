<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product Registration</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

	<div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
		<h2 class="text-2xl font-bold mb-6 text-gray-800">Register Product</h2>
		
		<div data-th-if="${param.success}" class="bg-green-100 text-green-700 p-3 rounded mb-4">
			Product saved successfully.
		</div>
		
		<form data-th-action="@{/products}" data-th-object="${productForm}" method="post" class="space-y-4">
		
			<div>
				<label for="name" class="block text-sm font-medium text-gray-700">Name</label>
				<input type="text" id="name" data-th-field="*{name}"
					class="mt-1 block w-full border rounded-md p-2 focus:ring-blue-500"
					data-th-classappend="${#fields.hasErrors('name') ? 'border-red-500' : 'border-gray-300'}" >
				<p data-th-if="${#fields.hasErrors('name')}" data-th-errors="*{name}" class="text-red-500 text-xs mt-1"></p>
			</div>
			
			<div>
				<label for="price" class="block text-sm font-medium text-gray-700">Price</label>
				<input type="number" id="price" data-th-field="*{price}"
					class="mt-1 block w-full border rounded-md p-2 focus:ring-blue-500"
					data-th-classappend="${#fields.hasErrors('price') ? 'border-red-500' : 'border-gray-300'}" >
				<p data-th-if="${#fields.hasErrors('price')}" data-th-errors="*{price}" class="text-red-500 text-xs mt-1"></p>
			</div>
			
			<button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 transition">
				Save Product
			</button>
		
		</form>
	</div>

</body>
</html>
