<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Image Gallery</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-8">

	<h1 class="text-4xl font-bold mb-8 text-center text-indigo-600">Photo Gallery</h1>

	<div class="bg-white p-6 rounded-xl shadow-md mb-10 border border-gray-100 flex justify-center">
		<form data-th-action="@{/upload}" method="post" enctype="multipart/form-data" class="flex items-center space-x-4 w-full max-w-lg">
			<input type="file" name="file" accept="image/*" required
				class="block w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition">
				
			<button type="submit" class="bg-indigo-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-indigo-700 transition shadow-sm">
				Upload
			</button>
		</form>
	</div>
	
	<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
		<div data-th-each="image : ${images}" class="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-xl transition duration-300 border border-gray-100">
			<img data-th-src="${image}" data-th-alt="${image}" class="w-full h-56 object-cover">
		</div>
	</div>
	
	<div data-th-if="${#lists.isEmpty(images)}" class="text-center text-gray-400 mt-10">
		<p>No images uploaded yet. Please upload an image!</p>
	</div>

</body>
</html>
