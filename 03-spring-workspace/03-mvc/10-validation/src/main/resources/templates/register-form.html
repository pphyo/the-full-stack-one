<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registration Form</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-10">

	<div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">
		<h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Create an account</h2>
		
		<div data-th-if="${param.success}" class="bg-green-100 text-green-700 p-3 rounded mb-4 text-sm text-center">Registration successful!</div>
		
		<form data-th-action="@{/register}" data-th-object="${userForm}" method="post" class="space-y-5">
			
			<div>
				<label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
				<input type="text" data-th-field="*{email}"
					class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"
					data-th-classappend="${#fields.hasErrors('email')} ? 'border-red-500' : 'border-gray-300'" >
				<p data-th-if="${#fields.hasErrors('email')}" data-th-errors="*{email}" class="text-red-500 text-xs mt-1"></p>
			</div>
			
			<div>
				<label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
				<input type="password" data-th-field="*{password}"
					class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"
					data-th-classappend="${#fields.hasErrors('password')} ? 'border-red-500' : 'border-gray-300'" >
				<p data-th-if="${#fields.hasErrors('password')}" data-th-errors="*{password}" class="text-red-500 text-xs mt-1"></p>
			</div>
			
			<div>
				<label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
				<input type="password" data-th-field="*{confirmPassword}"
					class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"
					data-th-classappend="${#fields.hasErrors('confirmPassword')} ? 'border-red-500' : 'border-gray-300'" >
				<p data-th-if="${#fields.hasErrors('confirmPassword')}" data-th-errors="*{confirmPassword}" class="text-red-500 text-xs mt-1"></p>
			</div>
			
			<div>
				<label class="block text-sm font-medium text-gray-700 mb-1">Bio</label>
				<textarea data-th-field="*{bio}"
					class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"
					data-th-classappend="${#fields.hasErrors('bio')} ? 'border-red-500' : 'border-gray-300'"></textarea>
				<p data-th-if="${#fields.hasErrors('bio')}" data-th-errors="*{bio}" class="text-red-500 text-xs mt-1"></p>
			</div>
			
			<div>
				<label class="block text-sm font-medium text-gray-700 mb-1">Country</label>
				<select data-th-field="*{country}" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"
				data-th-classappend="${#fields.hasErrors('country')} ? 'border-red-500' : 'border-gray-300'">
					<option value="">-- Select Country --</option>
					<option value="Myanmar">Myanmar</option>
					<option value="Singapore">Singapore</option>
					<option value="Japan">Japan</option>
				</select>
				<p data-th-if="${#fields.hasErrors('country')}" data-th-errors="*{country}" class="text-red-500 text-xs mt-1"></p>
			</div>
			
			<div>
				<label class="block text-sm font-medium text-gray-700 mb-1">Gender</label>
				<div class="flex items-center space-x-4">
					<label for="male" class="inline-flex items-center">
						<input type="radio" id="male" data-th-field="*{gender}" value="Male" class="text-bule-600 focus:ring-blue-500" >
						<span class="ml-2 text-sm text-gray-700">Male</span>
					</label>
					<label for="female" class="inline-flex items-center">
						<input type="radio" id="female" data-th-field="*{gender}" value="Female" class="text-bule-600 focus:ring-blue-500" >
						<span class="ml-2 text-sm text-gray-700">Female</span>
					</label>
				</div>
			</div>
			
			<div>
				<input type="checkbox" id="subscribe" data-th-field="*{subscribe}" class="h-4 w-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500" >
				<label for="subscribe" class="ml-2 text-sm text-gray-700">Subscribe to newsletter</label>
			</div>
			
			<button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition duration-200">
				Register
			</button>
			
		</form>
	</div>

</body>
</html>
